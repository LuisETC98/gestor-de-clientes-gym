<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core" >

<h:head>
    <title>Zona Fit (GYM)</title>

    <!-- Tema oscuro de PrimeOne -->
    <link rel="stylesheet" href="https://unpkg.com/primeflex@latest/themes/primeone-dark.css" />

    <!-- PrimeFlex -->
    <link rel="stylesheet" href="https://unpkg.com/primeflex@latest/primeflex.min.css" />

    <!-- PrimeIcons (para íconos opcionales) -->
    <link rel="stylesheet" href="https://unpkg.com/primeicons/primeicons.css" />

    <meta charset="UTF-8"/>
</h:head>

<h:body>

    <div class="card">
        <h:form id="forma-clientes">
            <p:growl id="mensajes" showDetails="true"/>
            <div class="card">
                <p:menubar>
                    <p:menuitem value="Inicio" icon="pi pi-fw pi-user"
                                update=":forma-clientes:clientes-tabla"
                                actionListener="#{indexControlador.cargarDatos}"/>
                    <p:menuitem value="Nuevo Cliente" icon="pi pi-fw pi-plus"
                                actionListener="#{indexControlador.agregarCliente}"
                                update=":forma-modal:cliente-ventana"
                                oncomplete="PF('ventanaModalCliente').show()"/>
                </p:menubar>
            </div>

            <!-- Datatable -->
            <p:dataTable value="#{indexControlador.clientes}" var="cliente" id="clientes-tabla"
                         widgetVar="clientesTabla">
                <f:facet name="header">
                    <div class="flex align-items-center justify-content-center
                    flex-wrap card-container yellow-container">
                        <div class="flex align-items-center justify-content-center
                                bg-yellow-500 text-gray-900 font-bold px-4 py-2 border-round shadow-3">
                            <h3>Zona Fit (GYM)</h3>
                        </div>
                    </div>
                </f:facet>

                <p:column headerText="Id">
                    <h:outputText value="#{cliente.id}" />
                </p:column>

                <p:column headerText="Nombre">
                    <h:outputText value="#{cliente.nombre}" />
                </p:column>

                <p:column headerText="Apellido">
                    <h:outputText value="#{cliente.apellido}" />
                </p:column>

                <p:column headerText="Membresía">
                    <h:outputText value="#{cliente.membresia}" />
                </p:column>

                <p:column headerText="Acciones">
                    <p:commandButton value="Editar" icon="pi pi-pencil"
                                     update=":forma-modal:cliente-ventana"
                                     process="@this"
                                     oncomplete="PF('ventanaModalCliente').show()"
                                     class="ui-button-primary"
                                     style="margin-right: .5rem">
                        <f:setPropertyActionListener value="#{cliente}"
                                                     target="#{indexControlador.clienteSeleccionado}"/>
                        <p:resetInput target=":forma-modal:cliente-ventana"/>
                    </p:commandButton>

                    <p:commandButton value="Eliminar" class="ui-button-danger"
                                     icon="pi pi-trash"
                                     process="@this"
                                     oncomplete="PF('eliminarClienteVentana').show()">
                        <f:setPropertyActionListener
                                value="#{cliente}"
                                target="#{indexControlador.clienteSeleccionado}"/>
                    </p:commandButton>
                </p:column>

            </p:dataTable>
        </h:form>

        <!--Modales-->
        <h:form id="forma-modal">
            <p:dialog header="Detalles Cliente"
                      widgetVar="ventanaModalCliente"
                      modal="true"
                      showEffect="fade"
                      responsive="true">

                <p:outputPanel id="cliente-ventana" styleClass="ui-fluid">
                    <div class="field">
                        <p:outputLabel for="nombre" value="Nombre"/>
                        <p:inputText id="nombre" value="#{indexControlador.clienteSeleccionado.nombre}"/>

                    </div>
                    <div class="field">
                        <p:outputLabel for="apellido" value="Apellido"/>
                        <p:inputText id="apellido" value="#{indexControlador.clienteSeleccionado.apellido}"/>
                    </div>
                    <div class="field">
                        <p:outputLabel for="email" value="Email"/>
                        <p:inputText id="email" value="#{indexControlador.clienteSeleccionado.email}"/>

                    </div>
                    <div class="field">
                        <p:outputLabel for="membresia" value="Membresía"/>
                        <p:inputText id="membresia" value="#{indexControlador.clienteSeleccionado.membresia}"/>

                    </div>
                </p:outputPanel>
                <f:facet name="footer">
                    <p:commandButton value="Guardar" icon="pi pi-check"
                                     process="cliente-ventana @this"
                                     update=":forma-clientes:mensajes"
                                     action="#{indexControlador.guardarCliente()}"/>
                    <p:commandButton value="Cancelar" icon="pi pi-times"
                                     onclick="PF('ventanaModalCliente').hide()"
                                     styleClass="ui-button-secondary" type="button"/>
                </f:facet>
            </p:dialog>

            <p:confirmDialog widgetVar="eliminarClienteVentana"
                             showEffect="fade" width="300"
                             message="¿Confirma eliminación?"
                             header="Confirmar" severity="warn">
                <p:commandButton value="Si" icon="pi pi-check"
                                 process="@this"
                                 actionListener="#{indexControlador.eliminarCliente}"
                                 oncomplete="PF('eliminarClienteVentana').hide()"/>
                <p:commandButton value="No" type="button"
                                 styleClass="ui-button-secondary"
                                 icon="pi pi-times"
                                 onclick="PF('eliminarClienteVentana').hide()"/>
            </p:confirmDialog>
        </h:form>
    </div>

</h:body>
</html>
