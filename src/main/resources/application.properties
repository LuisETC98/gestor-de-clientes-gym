spring.application.name=zona_fit
spring.datasource.url=jdbc:mysql://localhost:3306/zona_fit_db?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true
spring.datasource.username=
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
#spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

#Desactivar banner de Spring
spring.main.banner-mode=off

#Configuración del log (al mínimo)
logging.pattern.console=%msg%n
logging.level.root=INFO

#Desactivación de tomcat: innecesario en este caso al ser una aplicación local de consola
#spring.main.web-application-type=none

#Tema de primeFaces
joinfaces.primefaces.theme=vela